<div class="app-shell" [class.split-dragging]="isDraggingSplit" (click)="onGlobalClick($event)" (keydown)="onGlobalKeyDown($event)">

  <!-- ── Sidebar ───────────────────────────────────────────── -->
  <aside class="sidebar" [class.collapsed]="isExplorerCollapsed">
    <app-file-explorer
      [workspaceRoots]="workspaceRoots"
      [recentFiles]="recentFiles"
      (fileOpened)="onFileOpened($event)"
      (fileDoubleClicked)="openFileAsNewTab($event)"
      (workspaceOpened)="onWorkspaceOpened($event)"
      (workspaceRemoved)="onWorkspaceRemoved($event)"
      (recentFileOpened)="onRecentFileOpened($event)">
    </app-file-explorer>
  </aside>

  <!-- ── Main Area ──────────────────────────────────────────── -->
  <div class="main-area">

    <!-- ── Toolbar ────────────────────────────────────────────── -->
    <header class="toolbar">

      <!-- Sidebar toggle -->
      <button class="tb-btn icon-btn sidebar-toggle"
              (click)="toggleExplorer()"
              [title]="isExplorerCollapsed ? 'Show Explorer (Ctrl+B)' : 'Hide Explorer (Ctrl+B)'">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="2" width="3" height="12" rx="1"/>
          <rect x="6" y="2" width="9" height="2" rx="1"/>
          <rect x="6" y="7" width="9" height="2" rx="1"/>
          <rect x="6" y="12" width="9" height="2" rx="1"/>
        </svg>
      </button>

      <div class="tb-divider"></div>

      <!-- View mode: separate buttons -->
      <div class="view-mode-group" role="group" aria-label="View mode">
        <button class="tb-btn view-btn"
                [class.active]="viewMode === 'preview'"
                (click)="setViewMode('preview')"
                title="Preview (Ctrl+1)">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="currentColor">
            <path d="M7.5 2C4.46 2 2 4.46 2 7.5S4.46 13 7.5 13 13 10.54 13 7.5 10.54 2 7.5 2zm0 9.5a4 4 0 110-8 4 4 0 010 8zm0-6.5a2.5 2.5 0 100 5 2.5 2.5 0 000-5z"/>
          </svg>
          <span class="view-label">Preview</span>
        </button>
        <button class="tb-btn view-btn"
                [class.active]="viewMode === 'edit'"
                (click)="setViewMode('edit')"
                title="Edit (Ctrl+2)">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="currentColor">
            <path d="M11.5 1.5a1.5 1.5 0 012.12 2.12L5 12.24l-2.83.71.71-2.83L11.5 1.5zM10.44 2.56l2 2L4.71 12.29l-1.41.35.35-1.41L10.44 2.56z"/>
          </svg>
          <span class="view-label">Edit</span>
        </button>
        <button class="tb-btn view-btn"
                [class.active]="viewMode === 'split'"
                (click)="setViewMode('split')"
                title="Split (Ctrl+3)">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="currentColor">
            <rect x="1" y="1" width="5.5" height="13" rx="1" opacity=".9"/>
            <rect x="8.5" y="1" width="5.5" height="13" rx="1" opacity=".9"/>
          </svg>
          <span class="view-label">Split</span>
        </button>
      </div>

      <div class="tb-divider"></div>

      <!-- Spacer -->
      <div class="tb-spacer"></div>

      <!-- Auto-save toggle -->
      <button class="tb-btn icon-btn"
              [class.active]="autoSaveEnabled"
              (click)="toggleAutoSave()"
              [title]="autoSaveEnabled ? 'Auto-save ON — click to disable' : 'Auto-save OFF — click to enable'">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="currentColor">
          <path d="M3 1h7.5L13 3.5V13a1 1 0 01-1 1H3a1 1 0 01-1-1V2a1 1 0 011-1zm7 1v3H4V2h6zm-2 6a2 2 0 110 4 2 2 0 010-4z"/>
        </svg>
      </button>

      <!-- Search toggle -->
      <button class="tb-btn icon-btn search-toggle-btn"
              [class.active]="searchState.isActive"
              (click)="toggleSearch()"
              title="Search (Ctrl+F)">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="currentColor">
          <path d="M10 6.5a3.5 3.5 0 11-7 0 3.5 3.5 0 017 0zm-.7 3.92l2.64 2.64-.7.7-2.64-2.63A4.5 4.5 0 1110 6.5a4.48 4.48 0 01-.7 3.92z"/>
        </svg>
      </button>

      <!-- New file button -->
      <button class="tb-btn icon-btn" (click)="newFile()" title="New File (Ctrl+N)">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="currentColor">
          <path d="M8.5 1H3a1 1 0 00-1 1v11a1 1 0 001 1h9a1 1 0 001-1V5.5L8.5 1zm0 1.2L12.3 5H8.5V2.2z" opacity=".8"/>
          <path d="M6 9V7.5h1V9h1.5v1H7v1.5H6V10H4.5V9H6z"/>
        </svg>
      </button>

      <!-- Save dropdown -->
      <div class="dropdown" [class.open]="showSaveDropdown">
        <button class="tb-btn save-btn dropdown-toggle" (click)="toggleSaveDropdown()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
            <path d="M2 1h8l2 2v9a1 1 0 01-1 1H2a1 1 0 01-1-1V2a1 1 0 011-1zm7 0v4H3V1h6zm-2 7a2 2 0 110 4 2 2 0 010-4z"/>
          </svg>
          Save
          <svg class="chevron" width="10" height="10" viewBox="0 0 10 10" fill="currentColor">
            <path d="M2 3l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="dropdown-menu">
          <button class="dropdown-item" *ngIf="currentFilePath" (click)="saveFile(); closeSaveDropdown()">
            Save&nbsp;&nbsp;<kbd>Ctrl+S</kbd>
          </button>
          <button class="dropdown-item" (click)="saveAsFile(); closeSaveDropdown()">
            Save As...
          </button>
        </div>
      </div>

      <!-- Theme toggle -->
      <button class="tb-btn icon-btn" (click)="toggleTheme()" [title]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'">
        <!-- Sun icon: shown in dark mode, click to go light -->
        <svg *ngIf="isDarkTheme" width="15" height="15" viewBox="0 0 15 15" fill="currentColor">
          <circle cx="7.5" cy="7.5" r="2.5"/>
          <path d="M7.5 1v2M7.5 12v2M1 7.5h2M12 7.5h2M3.05 3.05l1.41 1.41M10.54 10.54l1.41 1.41M10.54 3.05l-1.41 1.41M4.46 10.54l-1.41 1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        </svg>
        <!-- Moon icon: shown in light mode, click to go dark -->
        <svg *ngIf="!isDarkTheme" width="15" height="15" viewBox="0 0 15 15" fill="currentColor">
          <path d="M13 8A5.5 5.5 0 1 1 7 2 4.5 4.5 0 0 0 13 8z"/>
        </svg>
      </button>

    </header>

    <!-- ── Tab Bar ──────────────────────────────────────────────── -->
    <div class="tab-bar" *ngIf="tabs.length > 0">
      <div class="tab"
           *ngFor="let tab of tabs"
           [class.active]="tab.id === activeTabId"
           [class.preview]="tab.isPreview"
           (click)="activateTab(tab.id)"
           (dblclick)="promoteTab(tab)"
           (mouseup)="$event.button === 1 && closeTab(tab, $event)"
           [title]="tab.filePath || 'Untitled'">
        <span class="tab-dirty" *ngIf="tab.isDirty">●</span>
        <span class="tab-name">{{ getTabDisplayName(tab) }}</span>
        <button class="tab-close" (click)="closeTab(tab, $event)" title="Close">
          <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M1 1l7 7M8 1l-7 7"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── External Change Banner ────────────────────────────── -->
    <div class="change-banner" *ngIf="showExternalChangeWarning">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M7 1L1 13h12L7 1zm0 3v4M7 10h.01"/></svg>
      <span>File changed on disk.</span>
      <button class="banner-btn primary" (click)="reloadCurrentFile()">Reload</button>
      <button class="banner-btn" (click)="dismissExternalChange()">Dismiss</button>
    </div>

    <!-- ── Editor Area ─────────────────────────────────────────── -->
    <div class="editor-area" #editorArea>

      <!-- Search/Replace overlay -->
      <div class="search-overlay" [class.visible]="searchState.isActive">
        <div class="search-panel">

          <!-- Search row -->
          <div class="sp-row">
            <button class="sp-toggle-replace"
                    *ngIf="viewMode !== 'preview'"
                    (click)="toggleReplace()"
                    [class.open]="isReplaceVisible"
                    title="Toggle replace">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <path d="M3 2l4 3-4 3"/>
              </svg>
            </button>
            <div class="sp-input-wrap">
              <input class="sp-input"
                     type="text"
                     placeholder="Find…"
                     [value]="searchState.query"
                     (input)="onSearchQueryChange($any($event.target).value)"
                     (keydown)="onSearchKeyDown($event)"
                     #searchInput>
              <div class="sp-options">
                <button class="sp-opt" [class.active]="searchOptions.caseSensitive"
                        (click)="toggleSearchOption('caseSensitive')" title="Match Case">Aa</button>
                <button class="sp-opt" [class.active]="searchOptions.wholeWord"
                        (click)="toggleSearchOption('wholeWord')" title="Whole Word">W</button>
                <button class="sp-opt" [class.active]="searchOptions.useRegex"
                        (click)="toggleSearchOption('useRegex')" title="Use Regex">.*</button>
              </div>
            </div>
            <div class="sp-nav">
              <span class="sp-count" *ngIf="searchState.query">
                {{ searchState.totalMatches > 0 ? searchState.currentIndex + '/' + searchState.totalMatches : 'No results' }}
              </span>
              <button class="sp-nav-btn" (click)="findPrevious()" [disabled]="!searchState.totalMatches" title="Previous (Shift+F3)">
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 7l3.5-3.5L9 7"/></svg>
              </button>
              <button class="sp-nav-btn" (click)="findNext()" [disabled]="!searchState.totalMatches" title="Next (F3)">
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 4l3.5 3.5L9 4"/></svg>
              </button>
              <button class="sp-nav-btn close-btn" (click)="closeSearch()" title="Close (Esc)">
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 2l7 7M9 2l-7 7"/></svg>
              </button>
            </div>
          </div>

          <!-- Replace row -->
          <div class="sp-row replace-row" *ngIf="isReplaceVisible && viewMode !== 'preview'">
            <div class="sp-replace-spacer"></div>
            <div class="sp-input-wrap">
              <input class="sp-input"
                     type="text"
                     placeholder="Replace…"
                     [(ngModel)]="replaceQuery"
                     (keydown)="onReplaceKeyDown($event)"
                     #replaceInput>
            </div>
            <div class="sp-nav replace-actions">
              <button class="sp-action-btn" (click)="replaceOne()"
                      [disabled]="!searchState.query || !searchState.totalMatches"
                      title="Replace (Enter)">Replace</button>
              <button class="sp-action-btn" (click)="replaceAll()"
                      [disabled]="!searchState.query || !searchState.totalMatches"
                      title="Replace All (Shift+Enter)">All</button>
            </div>
          </div>

        </div>
      </div>

      <!-- Editor pane -->
      <div class="pane editor-pane"
           *ngIf="viewMode === 'edit' || viewMode === 'split'"
           [style.flex-basis]="viewMode === 'split' ? editorPaneWidth + '%' : null"
           [style.flex-grow]="viewMode === 'split' ? 0 : 1">
        <app-markdown-editor
          #markdownEditor
          [content]="currentFileContent"
          (contentChange)="onContentChanged($event)">
        </app-markdown-editor>
      </div>

      <!-- Divider (split mode) -->
      <div class="split-divider"
           *ngIf="viewMode === 'split'"
           [class.dragging]="isDraggingSplit"
           (mousedown)="onSplitDividerMouseDown($event)"></div>

      <!-- Preview pane -->
      <div class="pane preview-pane"
           *ngIf="viewMode === 'preview' || viewMode === 'split'"
           [style.flex-basis]="viewMode === 'split' ? (100 - editorPaneWidth) + '%' : null"
           [style.flex-grow]="viewMode === 'split' ? 0 : 1">
        <app-markdown-preview
          #markdownPreview
          [content]="currentFileContent">
        </app-markdown-preview>
      </div>

    </div>

    <!-- ── Status Bar ──────────────────────────────────────────── -->
    <footer class="status-bar">
      <div class="status-left">
        <span class="status-item status-filepath" *ngIf="currentFilePath" [title]="currentFilePath">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="currentColor"><path d="M2 1h5l2 2v7H2V1zm4 0v2h2"/></svg>
          {{ getFileName(currentFilePath) }}
        </span>
      </div>
      <div class="status-right">
        <span class="status-item autosave-flash" *ngIf="showAutoSaveIndicator">Saved</span>
        <span class="status-item autosave-on" *ngIf="autoSaveEnabled && !showAutoSaveIndicator">Auto-save on</span>
        <span class="status-sep" *ngIf="currentFilePath">|</span>
        <span class="status-item" *ngIf="currentFilePath" title="Words">{{ wordCount }} words</span>
        <span class="status-sep" *ngIf="currentFilePath">·</span>
        <span class="status-item" *ngIf="currentFilePath" title="Characters">{{ charCount }} chars</span>
        <span class="status-sep" *ngIf="currentFilePath">·</span>
        <span class="status-item" *ngIf="currentFilePath" title="Lines">{{ lineCount }} lines</span>
      </div>
    </footer>

  </div>
</div>
